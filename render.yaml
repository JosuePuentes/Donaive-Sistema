# Render Blueprint — Donaive (monorepo pnpm)
# Docs: https://render.com/docs/monorepo-support

services:
  - type: web
    name: donaive-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:api
    startCommand: pnpm run start:api:render
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: API_PORT
        value: "10000"

  - type: web
    name: donaive-web
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:web
    startCommand: pnpm --filter @flp/web start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        sync: false
